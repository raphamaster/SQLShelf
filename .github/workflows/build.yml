name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

jobs:
  # -----------------------------------------------------------------------
  # Run tests on all platforms
  # -----------------------------------------------------------------------
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (headless)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest --tb=short -q

  # -----------------------------------------------------------------------
  # Build Windows distributable (only on push/release)
  # -----------------------------------------------------------------------
  build-windows:
    needs: test
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller sqlshelf.spec --noconfirm

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: SQLShelf-windows
          path: dist/SQLShelf/
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/SQLShelf/
          asset_name: SQLShelf-windows.zip
          asset_content_type: application/zip
